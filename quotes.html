<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Quote</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@300&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    font-family: 'Lora', serif;
  }
  .quote-wrap {
    max-width: 900px; /* Wider for that 'main feature' look */
    width: 100%;
    border-left: 4px solid #c8b89a; /* Thicker border */
    padding: 0.5rem 0 0.5rem 2.5rem;
    transition: transform 0.3s ease;
  }
  .quote-wrap:hover {
    transform: translateX(5px); /* Subtle interaction */
  }
  .quote-text {
    font-size: 28px; /* Significantly larger */
    font-style: italic;
    color: #3d3530;
    line-height: 1.4;
    font-weight: 400;
    margin-bottom: 1.2rem;
  }
  .quote-author {
    font-family: 'DM Mono', monospace;
    font-size: 13px; /* Scaled up slightly */
    letter-spacing: 0.2em;
    color: #a09080;
    text-transform: uppercase;
  }
  
  /* Mobile/Small Embed Optimization */
  @media (max-width: 600px) {
    .quote-text { font-size: 20px; }
    .quote-wrap { padding-left: 1.5rem; }
  }
</style>
</head>
<body>
<div class="quote-wrap">
  <p class="quote-text" id="qt"></p>
  <p class="quote-author" id="au"></p>
</div>
<script>
const quotes = [
  { text: "The secret of getting ahead is getting started.", author: "Mark Twain" },
  { text: "It always seems impossible until it's done.", author: "Nelson Mandela" },
  { text: "Don't watch the clock; do what it does. Keep going.", author: "Sam Levenson" },
  { text: "The expert in anything was once a beginner.", author: "Helen Hayes" },
  { text: "Push yourself, because no one else is going to do it for you.", author: "Unknown" },
  { text: "Great things never come from comfort zones.", author: "Unknown" },
  { text: "Dream it. Wish it. Do it.", author: "Unknown" },
  { text: "Success doesn't just find you. You have to go out and get it.", author: "Unknown" },
  { text: "The harder you work for something, the greater you'll feel when you achieve it.", author: "Unknown" },
  { text: "Don't stop when you're tired. Stop when you're done.", author: "Unknown" },
  { text: "Wake up with determination. Go to bed with satisfaction.", author: "Unknown" },
  { text: "Do something today that your future self will thank you for.", author: "Sean Patrick Flanery" },
  { text: "Little things make big days.", author: "Unknown" },
  { text: "It's going to be hard, but hard does not mean impossible.", author: "Unknown" },
  { text: "Don't wait for opportunity. Create it.", author: "Unknown" },
  { text: "Sometimes we're tested not to show our weaknesses, but to discover our strengths.", author: "Unknown" },
  { text: "The key to success is to focus on goals, not obstacles.", author: "Unknown" },
  { text: "Believe you can and you're halfway there.", author: "Theodore Roosevelt" },
  { text: "Act as if what you do makes a difference. It does.", author: "William James" },
  { text: "Success is not final, failure is not fatal: it is the courage to continue that counts.", author: "Winston Churchill" },
  { text: "Develop success from failures. Discouragement and failure are two of the surest stepping stones to success.", author: "Dale Carnegie" },
  { text: "You don't have to be great to start, but you have to start to be great.", author: "Zig Ziglar" },
  { text: "The difference between ordinary and extraordinary is that little extra.", author: "Jimmy Johnson" },
  { text: "Quality is not an act, it is a habit.", author: "Aristotle" },
  { text: "Motivation is what gets you started. Habit is what keeps you going.", author: "Jim Rohn" },
  { text: "You will never always be motivated. You have to learn to be disciplined.", author: "Unknown" },
  { text: "Discipline is choosing between what you want now and what you want most.", author: "Abraham Lincoln" },
  { text: "The pain of discipline is far less than the pain of regret.", author: "Sarah Bombell" },
  { text: "Strive for progress, not perfection.", author: "Unknown" },
  { text: "An engineer is someone who is good at the impossible.", author: "Theodore von Kármán" },
  { text: "Engineering is the art of directing the great sources of power in nature for the use and convenience of man.", author: "Thomas Tredgold" },
  { text: "The engineering is secondary to the vision.", author: "Cynthia Breazeal" },
  { text: "Scientists dream about doing great things. Engineers do them.", author: "James Michener" },
  { text: "To the optimist, the glass is half full. To the pessimist, the glass is half empty. To the engineer, the glass is twice as big as it needs to be.", author: "Unknown" },
  { text: "A smooth sea never made a skilled sailor.", author: "Franklin D. Roosevelt" },
  { text: "The more that you read, the more things you will know.", author: "Dr. Seuss" },
  { text: "Study hard what interests you the most in the most undisciplined, irreverent and original manner possible.", author: "Richard Feynman" },
  { text: "Education is the most powerful weapon which you can use to change the world.", author: "Nelson Mandela" },
  { text: "The beautiful thing about learning is that no one can take it away from you.", author: "B.B. King" },
  { text: "Commit to the plan. Even on the days you don't feel like it.", author: "Unknown" },
  { text: "You don't rise to the level of your goals. You fall to the level of your systems.", author: "James Clear" },
  { text: "Small daily improvements over time lead to stunning results.", author: "Robin Sharma" },
  { text: "Be consistent. Be patient. Be persistent.", author: "Unknown" },
  { text: "Every day do something that will inch you closer to a better tomorrow.", author: "Doug Firebaugh" },
  { text: "The way to get started is to quit talking and begin doing.", author: "Walt Disney" },
  { text: "Start where you are. Use what you have. Do what you can.", author: "Arthur Ashe" },
  { text: "You've got to get up every morning with determination if you're going to go to bed with satisfaction.", author: "George Lorimer" },
  { text: "Hardships often prepare ordinary people for an extraordinary destiny.", author: "C.S. Lewis" },
  { text: "It does not matter how slowly you go as long as you do not stop.", author: "Confucius" },
  { text: "Energy and persistence conquer all things.", author: "Benjamin Franklin" },
];

const day = Math.floor(Date.now() / 86400000);
const q = quotes[day % quotes.length];
document.getElementById('qt').textContent = '\u201C' + q.text + '\u201D';
document.getElementById('au').textContent = '— ' + q.author;
</script>
</body>
</html>
